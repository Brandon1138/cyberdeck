name: Publish npm package

on:
  workflow_dispatch:
    inputs:
      npm_tag:
        description: npm distribution tag
        required: true
        default: next
        type: choice
        options:
          - next
          - latest

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: macos-14
    timeout-minutes: 20
    environment: release

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Require a version tag
        run: |
          case "$GITHUB_REF" in
            refs/tags/v*) ;;
            *) echo "Run this workflow from a v* tag." >&2; exit 1 ;;
          esac
          package_version=$(node -p 'require("./package.json").version')
          test "$GITHUB_REF_NAME" = "v$package_version"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          registry-url: https://registry.npmjs.org/

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: |
          pnpm check
          pnpm test

      - name: Publish with provenance
        run: pnpm publish --access public --tag "${{ inputs.npm_tag }}" --provenance --no-git-checks
