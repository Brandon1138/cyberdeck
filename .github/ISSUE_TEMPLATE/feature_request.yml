name: Feature request
description: Propose a focused improvement
title: "feature: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should Cyberdeck solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed boundary
      description: Describe the smallest useful outcome and important safety constraints.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
